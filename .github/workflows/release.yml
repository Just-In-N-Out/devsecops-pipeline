name: Release

# Tag-driven releases. Pushing vX.Y.Z creates a GitHub release with notes
# pulled from CHANGELOG.md and force-moves the floating major tag (vX) so
# consumers pinned to @v1 pick up non-breaking updates automatically.
# Breaking changes go to a new major — v1 consumers are never broken.
#
# No third-party actions here on purpose: gh + git cover it, and the release
# path is the worst place to take on supply-chain surface.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG section for $version — falling back to generated notes"
            echo "generate=true" >> "$GITHUB_OUTPUT"
          else
            echo "generate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          GENERATE: ${{ steps.notes.outputs.generate }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping create"
            exit 0
          fi
          if [ "$GENERATE" = "true" ]; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          else
            gh release create "$TAG" --title "$TAG" --notes-file release-notes.md
          fi

      - name: Move floating major tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          major="${TAG%%.*}"   # v1.2.3 -> v1
          git tag -f "$major" "$TAG"
          git push -f origin "$major"
          echo "Floating tag $major -> $TAG"
