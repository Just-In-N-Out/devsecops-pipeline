name: Secrets scan (Gitleaks)

# Reusable secrets-scanning stage. Callable standalone or from full-scan.yml.
# Full git history is scanned (fetch-depth: 0) — a secret that was committed
# and later deleted is still compromised.

on:
  workflow_call:
    inputs:
      severity-threshold:
        description: Findings at or above this level fail the build
        type: string
        default: high
      baseline-branch:
        description: Only gate on findings not already present on this branch
        type: string
        default: main
      fail-on-findings:
        description: If false, report findings but never fail (advisory mode)
        type: boolean
        default: true
      post-comment:
        description: Post a sticky PR comment (full-scan disables this and posts one consolidated comment instead)
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # SARIF -> Security tab
      actions: read          # baseline artifact download
      pull-requests: write   # sticky PR comment
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # Reusable workflows execute against the CALLER's checkout, so configs
      # and scripts must come from this pipeline repo — at the exact ref the
      # consumer pinned, never a floating branch.
      - name: Resolve pipeline repo and ref
        id: pipeline
        env:
          # Two candidates because the documented home of this value has
          # moved between contexts; whichever is populated wins. Both give
          # "owner/repo/.github/workflows/<file>.yml@<ref>" for the workflow
          # file defining THIS job (i.e. the pipeline repo at the consumer's
          # pinned ref).
          CANDIDATE_A: ${{ github.job_workflow_ref }}
          CANDIDATE_B: ${{ job.workflow_ref }}
        run: |
          ref_path="${CANDIDATE_A:-$CANDIDATE_B}"
          echo "job_workflow_ref candidates: A='$CANDIDATE_A' B='$CANDIDATE_B'"
          if [ -z "$ref_path" ]; then
            echo "::error::Cannot resolve the pipeline workflow ref from the job context"
            exit 1
          fi
          echo "repo=${ref_path%%/.github/*}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref_path##*@}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ steps.pipeline.outputs.repo }}
          ref: ${{ steps.pipeline.outputs.ref }}
          path: .devsecops-pipeline

      # continue-on-error because the scanner must not decide the build:
      # severity-gate.sh owns pass/fail so advisory mode and baseline-diff
      # behave the same across every stage.
      - name: Run gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .devsecops-pipeline/configs/gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"

      - name: Stage SARIF
        run: |
          mkdir -p sarif-out
          [ -f results.sarif ] && cp results.sarif sarif-out/gitleaks.sarif || true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sarif-secrets
          path: sarif-out/
          if-no-files-found: ignore

      # Fork PRs lack security-events:write; don't fail the stage over it.
      - name: Upload SARIF to Security tab
        if: hashFiles('sarif-out/gitleaks.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: sarif-out/gitleaks.sarif
          category: secrets

      - name: Severity gate
        env:
          SARIF_DIR: sarif-out
          STAGE_NAME: secrets
          SEVERITY_THRESHOLD: ${{ inputs.severity-threshold }}
          FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
          BASELINE_BRANCH: ${{ inputs.baseline-branch }}
          BASELINE_ARTIFACT_NAME: scan-summary-secrets
          SUMMARY_PATH: scan-summary.json
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .devsecops-pipeline/scripts/severity-gate.sh

      - name: Upload scan summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scan-summary-secrets
          path: scan-summary.json
          if-no-files-found: ignore

      - name: Post PR comment
        if: always() && inputs.post-comment && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SUMMARY_PATH: scan-summary.json
          STAGE_MARKER: secrets
        with:
          script: |
            const run = require('./.devsecops-pipeline/scripts/pr-comment.js');
            await run({ github, context, core });
