name: Self-test

# Dogfood: run the full pipeline against this repo on every push. If the
# pipeline can't keep its own repo green, it has no business gating anyone
# else's. This is also the CI badge the README advertises.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  full-scan:
    uses: ./.github/workflows/full-scan.yml
    secrets: inherit
    permissions:
      contents: write       # sbom stage (release-asset attach on tag pushes)
      security-events: write
      actions: read
      pull-requests: write
    with:
      severity-threshold: high

