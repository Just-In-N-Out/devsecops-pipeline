name: SBOM (Syft)

# Reusable SBOM stage — informational only, never gates. Generates both
# CycloneDX and SPDX because downstream consumers rarely agree on one format
# (compliance tooling tends to want SPDX, dependency-tracking wants CycloneDX).
#
# On tag pushes the SBOMs are also attached to the GitHub release, which is
# why this job needs contents: write — callers that never push tags can run
# it with contents: read and the release upload is skipped.

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  syft:
    name: syft
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach SBOMs to the release on tag push
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          artifact-name: sbom-cyclonedx
          upload-release-assets: true

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom-spdx
          upload-release-assets: true
