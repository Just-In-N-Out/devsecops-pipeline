# Gitleaks configuration — devsecops-pipeline
#
# Extends the upstream default ruleset rather than replacing it. The custom
# rules below exist because the defaults tune for broad coverage; these are
# high-signal patterns we want flagged even when entropy alone wouldn't trip.
#
# Consumers: do NOT edit this file in the pipeline repo. Fork the rule you
# need into your own gitleaks.toml and point the workflow at it, or add an
# allowlist entry via PR to this repo with justification.

title = "devsecops-pipeline gitleaks config"

[extend]
useDefault = true

# --- Custom high-signal rules -----------------------------------------------

[[rules]]
id = "custom-aws-session-token"
description = "AWS temporary session credentials (ASIA-prefixed access key id)"
regex = '''\bASIA[0-9A-Z]{16}\b'''
keywords = ["ASIA"]

[[rules]]
id = "custom-stripe-live-key"
description = "Stripe live secret key — live keys must never appear in source"
regex = '''\bsk_live_[0-9a-zA-Z]{24,}\b'''
keywords = ["sk_live_"]
entropy = 2.0

[[rules]]
id = "custom-github-pat"
description = "GitHub classic personal access token"
regex = '''\bghp_[0-9A-Za-z]{36}\b'''
keywords = ["ghp_"]
entropy = 2.0

[[rules]]
id = "custom-slack-bot-token"
description = "Slack bot user OAuth token"
regex = '''\bxoxb-[0-9]{10,13}-[0-9]{10,13}-[0-9a-zA-Z]{20,}\b'''
keywords = ["xoxb-"]

# --- Allowlist ----------------------------------------------------------------
# Paths are RE2 regexes, not globs. Test fixtures and testdata are excluded
# because synthetic credentials are a legitimate testing pattern; this config
# file is excluded because its own rule regexes would otherwise match
# themselves on every scan.

[allowlist]
description = "Test fixtures, testdata, and this config file"
paths = [
  '''.*_test\.go$''',
  '''(^|/)fixtures(/|$)''',
  '''(^|/)testdata(/|$)''',
  '''(^|/)configs/gitleaks\.toml$''',
]
